<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ with .Params.description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
    <style>
        :root{
            --text-color:#222;
            --text-secondary:#666;
            --bg-color:#fff;
            --card-bg:#fff;
            --border-color:#e5e7eb;
            --accent-color:#111;
        }
        [data-theme="dark"]{
            --text-color:#e5e7eb;
            --text-secondary:#9ca3af;
            --bg-color:#000;
            --card-bg:#111;
            --border-color:#27272a;
            --accent-color:#e5e7eb;
        }
        *{box-sizing:border-box;margin:0;padding:0}
        html{scroll-behavior:smooth}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',Arial,sans-serif;color:var(--text-color);background:var(--bg-color);line-height:1.7}
        a{color:var(--accent-color);text-decoration:none}
        a:hover{text-decoration:underline}
        .container{max-width:920px;margin:0 auto;padding:2rem 1rem}
        header.site-header{border-bottom:1px solid var(--border-color);background:var(--bg-color);position:sticky;top:0;z-index:20}
        .header-inner{display:flex;align-items:center;justify-content:space-between;gap:1rem}
        .identity{display:flex;align-items:center;gap:1rem}
        .avatar{width:64px;height:64px;border-radius:50%;overflow:hidden;background:#222;display:flex;align-items:center;justify-content:center}
        .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
        .title h1{font-weight:600;font-size:1.5rem}
        .title .subtitle{font-size:.95rem;color:var(--text-secondary)}
        nav.top-nav ul{display:flex;gap:1rem;list-style:none}
        nav.top-nav a{display:block;padding:.5rem .75rem;border-radius:.5rem}
        main.main{padding-top:1rem}
        .theme-toggle{border:1px solid var(--border-color);background:var(--card-bg);border-radius:.5rem;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer}
        footer.site-footer{border-top:1px solid var(--border-color);color:var(--text-secondary);padding-top:1.5rem;margin-top:3rem;text-align:center}
        /* Content headings similar to reference */
        .content h2{font-size:1.5rem;font-weight:600;margin:2rem 0 1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border-color)}
        .content h3{font-size:1.1rem;font-weight:600;margin:1rem 0 .5rem}
        .content p{margin:.75rem 0;text-align:justify}
        .news-item{padding:1rem;border:1px solid var(--border-color);border-radius:.5rem;background:var(--card-bg);margin:.75rem 0}
        .news-date{font-weight:600;color:var(--text-secondary);margin-bottom:.25rem}
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="identity">
                <div class="avatar">
                    <img src="/images/eps-logo.svg" alt="EPS">
                </div>
                <div class="title">
                    <h1>Eshwara Prasad Sridhar</h1>
                    <div class="subtitle">
                        PhD Student · <a href="https://www.uta.edu/academics/schools-colleges/engineering/academics/departments/imse" target="_blank" rel="noopener">UTA IMSE</a>
                        · <a href="mailto:exs3645@mavs.uta.edu">exs3645@mavs.uta.edu</a>
                        · <a href="https://scholar.google.com/citations?user=6GXB3qEAAAAJ&hl=en" target="_blank" rel="noopener">Scholar</a>
                        · <a href="https://github.com/eshwaraprasadsridhar" target="_blank" rel="noopener">GitHub</a>
                        · <a href="https://www.linkedin.com/in/eshwaraprasad/" target="_blank" rel="noopener">LinkedIn</a>
                    </div>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:.5rem">
                <nav class="top-nav" aria-label="Primary">
                    <ul>
                        <li><a href="/">Home</a></li>
                        <li><a href="/cv/">CV</a></li>
                        <li><a href="/#about">About</a></li>
                        <li><a href="/#news">News</a></li>
                        <li><a href="/#publications">Publications</a></li>
                    </ul>
                </nav>
                <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme"><span class="theme-icon">🌙</span></button>
            </div>
        </div>
    </header>
    <main class="main">
        <div class="container content">
            {{ block "main" . }}{{ end }}
        </div>
    </main>
    <footer class="site-footer">
        <div class="container">
            &copy; {{ now.Year }} Eshwara Prasad Sridhar · Built with Hugo
        </div>
    </footer>
    <script>
        function toggleTheme(){
            const html=document.documentElement;
            const cur=html.getAttribute('data-theme');
            const next=cur==='dark'?'light':'dark';
            html.setAttribute('data-theme',next);
            localStorage.setItem('theme',next);
            const icon=document.querySelector('.theme-icon');
            if(icon) icon.textContent= next==='dark'?'☀️':'🌙';
        }
        (function init(){
            const saved=localStorage.getItem('theme');
            const prefersDark=window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme=saved || (prefersDark? 'dark':'light');
            document.documentElement.setAttribute('data-theme', theme);
            const icon=document.querySelector('.theme-icon');
            if(icon) icon.textContent= theme==='dark'?'☀️':'🌙';
        })();
    </script>
</body>
</html>
