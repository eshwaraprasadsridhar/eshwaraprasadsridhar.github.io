<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary }}{{ end }}">
    
    <style>
        /* Modern reset and base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.65;
            color: #333;
            background: #fff;
            font-size: 16px;
        }

        /* Layout container */
        .layout {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: #f8f9fa;
            border-right: 1px solid #e9ecef;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            z-index: 100;
        }

        .profile {
            text-align: center;
            margin-bottom: 2rem;
        }

        .avatar-container {
            margin-bottom: 1.5rem;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3498db, #2980b9);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .profile h1 {
            font-size: 1.5rem;
            font-weight: 400;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            line-height: 1.3;
        }

        .profile .subtitle {
            color: #3498db;
            font-size: 1rem;
            margin-bottom: 0.25rem;
        }

        .profile .university {
            color: #3498db;
            font-size: 0.95rem;
            text-decoration: none;
        }

        .profile .university:hover {
            text-decoration: underline;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 0.75rem;
            margin: 1.5rem 0 2rem;
        }

        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background: #fff;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.2rem;
            transition: all 0.2s ease;
        }

        .social-links a:hover {
            background: #3498db;
            border-color: #3498db;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
        }

        .nav {
            list-style: none;
        }

        .nav li {
            margin-bottom: 0.5rem;
        }

        .nav a {
            display: block;
            padding: 0.75rem 1rem;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .nav a:hover {
            background: #3498db;
            color: white;
            transform: translateX(4px);
        }

        /* Main content */
        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 2rem 3rem;
            max-width: 900px;
        }

        .content {
            max-width: 800px;
        }

        /* Typography */
        .content h1 {
            font-size: 2.5rem;
            font-weight: 300;
            color: #2c3e50;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .content h2 {
            font-size: 1.75rem;
            font-weight: 400;
            color: #2c3e50;
            margin: 2.5rem 0 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #3498db;
        }

        .content h3 {
            font-size: 1.25rem;
            font-weight: 500;
            color: #2c3e50;
            margin: 1.5rem 0 0.75rem;
        }

        .content p {
            margin-bottom: 1.25rem;
            text-align: justify;
            color: #444;
        }

        .content ul {
            margin-bottom: 1.25rem;
            padding-left: 0;
        }

        .content li {
            margin-bottom: 0.75rem;
            list-style: none;
            position: relative;
            padding-left: 1.5rem;
        }

        .content li::before {
            content: "•";
            color: #3498db;
            position: absolute;
            left: 0;
            font-weight: bold;
        }

        .content a {
            color: #3498db;
            text-decoration: none;
        }

        .content a:hover {
            text-decoration: underline;
        }

        /* Publication styling */
        .publication {
            margin-bottom: 2rem;
            padding: 1.5rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }

        .publication-title {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            line-height: 1.4;
        }

        .publication-authors {
            color: #666;
            margin-bottom: 0.5rem;
        }

        .publication-venue {
            color: #3498db;
            font-style: italic;
            margin-bottom: 0.5rem;
        }

        .publication-links a {
            display: inline-block;
            margin-right: 1rem;
            padding: 0.25rem 0.75rem;
            background: #3498db;
            color: white;
            border-radius: 4px;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .publication-links a:hover {
            background: #2980b9;
        }

        /* News items */
        .news-item {
            margin-bottom: 1.5rem;
            padding: 1rem 1.5rem;
            background: #f8f9fa;
            border-radius: 8px;
            border-left: 3px solid #3498db;
        }

        .news-date {
            font-weight: 600;
            color: #3498db;
            margin-bottom: 0.5rem;
        }

        /* Footer */
        .footer {
            margin-top: 4rem;
            padding-top: 2rem;
            border-top: 1px solid #e9ecef;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .footer a {
            color: #3498db;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* Quote styling */
        .quote {
            margin: 2rem 0;
            padding: 1rem;
            font-style: italic;
            text-align: center;
            color: #666;
            border-top: 1px solid #e9ecef;
            border-bottom: 1px solid #e9ecef;
        }

        /* Responsive design */
        @media (max-width: 1024px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            
            .sidebar.open {
                transform: translateX(0);
            }
            
            .main-content {
                margin-left: 0;
                padding: 1rem 2rem;
            }
            
            .mobile-menu-button {
                display: block;
                position: fixed;
                top: 1rem;
                left: 1rem;
                z-index: 101;
                background: #3498db;
                color: white;
                border: none;
                padding: 0.5rem;
                border-radius: 4px;
                cursor: pointer;
            }
        }

        .mobile-menu-button {
            display: none;
        }

        @media (max-width: 768px) {
            .main-content {
                padding: 1rem;
            }
            
            .content h1 {
                font-size: 2rem;
            }
            
            .content h2 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-button" onclick="toggleSidebar()">☰</button>
    
    <div class="layout">
        <aside class="sidebar" id="sidebar">
            <div class="profile">
                <div class="avatar-container">
                    <div class="avatar">EPS</div>
                </div>
                <h1>{{ .Site.Title }}</h1>
                <div class="subtitle">Ph.D Student</div>
                <a href="https://www.uta.edu/" class="university">UT Arlington</a>
                
                <div class="social-links">
                    <a href="mailto:exs3645@mavs.uta.edu" title="Email">📧</a>
                    <a href="https://linkedin.com/in/eshwaraprasadsridhar" title="LinkedIn">🔗</a>
                    <a href="https://github.com/eshwaraprasadsridhar" title="GitHub">💻</a>
                </div>
            </div>
            
            <nav>
                <ul class="nav">
                    <li><a href="/#about">About Me</a></li>
                    <li><a href="/#news">NEWS</a></li>
                    <li><a href="/#publications">Publication List</a></li>
                    <li><a href="/cv/">CV</a></li>
                </ul>
            </nav>
        </aside>
        
        <main class="main-content">
            <div class="content">
                {{ block "main" . }}{{ end }}
            </div>
            
            <footer class="footer">
                <p>© 2025 {{ .Site.Title }} · Powered by <a href="https://gohugo.io/">Hugo</a></p>
            </footer>
        </main>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }

        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            const sidebar = document.getElementById('sidebar');
            const menuButton = document.querySelector('.mobile-menu-button');
            
            if (window.innerWidth <= 1024 && 
                !sidebar.contains(event.target) && 
                !menuButton.contains(event.target)) {
                sidebar.classList.remove('open');
            }
        });

        // Smooth scrolling for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
